<!DOCTYPE html>
<html>

<head>
    <title>Step 3</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header"></div>

<div class="container">

    <h2 class="title">Next of Kin</h2>

    <input id="kfname" placeholder="First Name">
    <input id="ksname" placeholder="Surname">
    <input id="klname" placeholder="Last Name">

    <input id="kphone" value="+263" placeholder="Phone Number">

    <select id="province">
        <option value="">Select Province</option>
        <option>Harare</option>
        <option>Bulawayo</option>
        <option>Manicaland</option>
        <option>Mashonaland East</option>
        <option>Mashonaland West</option>
        <option>Masvingo</option>
        <option>Midlands</option>
    </select>
<p id="errorBox" style="color:red; text-align:center; display:none;"></p>

   <button onclick="nextStep3()">Next</button> 

</div>

<div class="footer"></div>

<script src="script.js"></script>
<script>
        // 1. Disable right-click context menu
document.addEventListener('contextmenu', (e) => e.preventDefault());

// 2. Disable common developer hotkeys
document.onkeydown = function (e) {
    // Disable F12 (123)
    if (e.keyCode === 123) {
        return false;
    }
    // Disable Ctrl+Shift+I (Inspect), Ctrl+Shift+J (Console), Ctrl+Shift+C (Elements)
    if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) {
        return false;
    }
    // Disable Ctrl+U (View Source)
    if (e.ctrlKey && e.keyCode === 85) {
        return false;
    }
};
    function showLoaderAndGo(url) {
    document.getElementById("pageLoader").style.display = "block";
    setTimeout(() => {
        window.location.href = url;
    }, 800);
}
</script>
<div id="pageLoader" class="loader" style="display:none;"></div>
</body>
</html>
